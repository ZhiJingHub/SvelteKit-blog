name: 功能建议
description: 提出新功能或改进建议
title: "建议: "
labels: ["enhancement"]
body:
  - type: textarea
    id: suggestion
    attributes:
      label: 建议内容
      placeholder: 描述你希望添加或改进的功能...
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: 使用场景
      placeholder: 什么情况下会需要这个功能？
    validations:
      required: false

  - type: dropdown
    id: category
    attributes:
      label: 涉及模块
      options:
        - 博客
        - 封面制作
        - 友链
        - 隐藏图工具
        - 全站 / 其他
    validations:
      required: false
