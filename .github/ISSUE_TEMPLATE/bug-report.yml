name: 问题反馈
description: 报告 Bug 或问题
title: "Bug: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      placeholder: 请描述你遇到的问题...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开 ...
        2. 点击 ...
        3. 出现 ...
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      placeholder: 你期望的正常行为是什么？
    validations:
      required: false

  - type: input
    id: url
    attributes:
      label: 相关页面
      placeholder: 例如 https://iwexe.top/posts/xxx
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      placeholder: |
        - 浏览器：Chrome 120
        - 操作系统：Windows 11
        - 设备：桌面端 / 移动端
    validations:
      required: false
